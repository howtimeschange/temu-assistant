name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron-app/package-lock.json

      - name: Install npm deps
        run: cd electron-app && npm ci

      - name: Download bundled Python (all mac arches)
        run: |
          BASE="https://github.com/astral-sh/python-build-standalone/releases/download/20260310"
          DIST="electron-app/python-dist"
          mkdir -p "$DIST/mac-arm64" "$DIST/mac-x64"

          echo "⬇️ Python arm64..."
          curl -L -o /tmp/py_arm64.tar.gz \
            "${BASE}/cpython-3.12.13%2B20260310-aarch64-apple-darwin-install_only.tar.gz"
          tar -xzf /tmp/py_arm64.tar.gz -C "$DIST/mac-arm64" --strip-components=1

          echo "⬇️ Python x64..."
          curl -L -o /tmp/py_x64.tar.gz \
            "${BASE}/cpython-3.12.13%2B20260310-x86_64-apple-darwin-install_only.tar.gz"
          tar -xzf /tmp/py_x64.tar.gz -C "$DIST/mac-x64" --strip-components=1

          echo "📦 Installing openpyxl + fastapi + uvicorn..."
          "$DIST/mac-arm64/bin/pip3" install openpyxl fastapi uvicorn --quiet
          "$DIST/mac-x64/bin/pip3" install openpyxl fastapi uvicorn --quiet

          echo "✅ Done: $(du -sh $DIST/mac-arm64 $DIST/mac-x64 | awk '{print $1, $2}')"

      - name: Build macOS DMG (arm64 + x64)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          cd electron-app
          npx electron-builder --mac dmg --config build.yml --publish never

      - name: Verify Python bundled in arm64 DMG
        run: |
          hdiutil attach "electron-app/dist/Temu Assistant-1.0.5-arm64.dmg" \
            -readonly -quiet -mountpoint /tmp/verify_dmg
          ls "/tmp/verify_dmg/Temu Assistant.app/Contents/Resources/" | grep python \
            && echo "✅ python dir found" || echo "❌ python dir missing"
          hdiutil detach /tmp/verify_dmg -quiet

      - uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          path: electron-app/dist/*.dmg
          retention-days: 3

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron-app/package-lock.json

      - name: Install npm deps
        run: cd electron-app && npm ci

      - name: Download bundled Python (win-x64)
        shell: bash
        run: |
          BASE="https://github.com/astral-sh/python-build-standalone/releases/download/20260310"
          DIST="electron-app/python-dist"
          mkdir -p "$DIST/win-x64"

          echo "⬇️ Python win-x64 (install_only, includes python312.dll)..."
          curl -L -o /tmp/py_win.tar.gz \
            "${BASE}/cpython-3.12.13%2B20260310-x86_64-pc-windows-msvc-install_only.tar.gz"
          tar -xzf /tmp/py_win.tar.gz -C "$DIST/win-x64" --strip-components=1

          WIN_SITE="$DIST/win-x64/Lib/site-packages"
          mkdir -p "$WIN_SITE"
          pip install openpyxl fastapi uvicorn --target "$WIN_SITE" --quiet
          echo "✅ openpyxl + fastapi + uvicorn installed to win-x64"

          echo "🔍 Verify python312.dll present:"
          find "$DIST/win-x64" -name "python3*.dll" 2>/dev/null | head -5

      - name: Build Windows NSIS installer
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          cd electron-app
          npx electron-builder --win nsis --x64 --config build.yml --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: win-dist
          path: electron-app/dist/*.exe
          retention-days: 3

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mac-dist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: win-dist
          path: dist/

      - name: List artifacts
        run: ls -lh dist/

      - name: Create / Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Temu Assistant ${{ github.ref_name }}"
          body: |
            ## 📦 下载安装包

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | macOS (Apple Silicon M1-M4) | `*-arm64.dmg` | 推荐 |
            | macOS (Intel) | `*-x64.dmg` | Intel Mac |
            | Windows 10/11 | `*Setup*.exe` | x64 |

            ## ✅ 开箱即用
            - 无需安装 Python 或 Node.js，无需安装 VC++ 运行时
            - 内置 CPython 3.12.13 完整版（含 python312.dll 及所有依赖）

            ## 🚀 使用前提
            - Chrome 浏览器（用于 CDP 抓取）
            - 在 Chrome 中登录 Temu 账号后，点击对应功能开始抓取

            ## 📋 功能
            - 商品数据 / 售后数据 / 店铺评价 / 店铺商品 → 导出 Excel

            ## 🔧 v1.0.5 修复
            - 修复 Windows 上 Python 启动崩溃（exit code 3221225781 / STATUS_DLL_NOT_FOUND）
            - 换用完整版 Python（install_only），内含 python312.dll，彻底无需额外安装任何运行时

          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: false
