appId: com.temu.assistant
productName: Temu Assistant
copyright: "Copyright © 2025"
electronVersion: "29.4.6"

directories:
  app: electron-app
  output: electron-app/dist
  buildResources: electron-app/assets

mac:
  category: public.app-category.business
  icon: electron-app/assets/icon.icns
  hardenedRuntime: false
  gatekeeperAssess: false
  target:
    - target: dmg
      arch:
        - arm64
        - x64

win:
  icon: electron-app/assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Temu Assistant

dmg:
  title: Temu Assistant
  window:
    width: 540
    height: 380

# Files to pack into the asar (relative to directories.app = electron-app/)
files:
  - "src/**/*"
  - "package.json"
  - "node_modules/**/*"
  - "!node_modules/bb-browser/**"

extraResources:
  # Temu Python scripts from project root (one level up from electron-app/)
  - from: "."
    to: python-scripts
    filter:
      - temu_goods_data.py
      - temu_aftersales.py
      - temu_reviews.py
      - temu_store_items.py
      - config.yaml
      - "src/**/*.py"
      - "adapters/**/*.js"
  # Backend FastAPI server
  - from: electron-app/backend
    to: backend
  # Bundled Python interpreter
  - from: electron-app/resources/python
    to: python
  # bb-browser (outside asar so .js files are accessible)
  - from: electron-app/node_modules/bb-browser
    to: bb-browser

asarUnpack:
  - "**/*.node"
