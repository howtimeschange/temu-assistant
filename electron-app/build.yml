appId: com.temu.assistant
productName: Temu Assistant
copyright: "Copyright © 2025"
electronVersion: "29.4.6"

directories:
  output: dist
  buildResources: assets

mac:
  category: public.app-category.business
  icon: assets/icon.icns
  hardenedRuntime: false
  gatekeeperAssess: false
  target:
    - target: dmg
      arch:
        - arm64
        - x64

win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Temu Assistant

dmg:
  title: Temu Assistant
  window:
    width: 540
    height: 380

files:
  - "src/**/*"
  - "package.json"
  - "node_modules/**/*"
  - "!node_modules/bb-browser/**"

extraResources:
  # Temu Python scripts (from project root, one level up)
  - from: "../"
    to: python-scripts
    filter:
      - temu_goods_data.py
      - temu_aftersales.py
      - temu_reviews.py
      - temu_store_items.py
      - config.yaml
      - "src/**/*.py"
      - "adapters/**/*.js"
  # Python 依赖（openpyxl 等）fallback vendor（打包 Python 里已含，这是双保险）
  - from: "python-vendor"
    to: python-scripts/vendor
  # ws node module（供 ELECTRON_RUN_AS_NODE 模式使用）
  - from: "node_modules/ws"
    to: python-scripts/node_modules/ws
  # Backend FastAPI server
  - from: backend
    to: backend
  # bb-browser
  - from: node_modules/bb-browser
    to: bb-browser

# macOS 打包时的额外钩子：通过 afterPack 脚本按 arch 拷贝对应 Python
afterPack: scripts/after-pack.js

asarUnpack:
  - "**/*.node"
